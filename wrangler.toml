main = ".open-next/worker.js"
name = "shahardahan-portflio"
compatibility_date = "2025-03-25"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[routes]]
pattern = "shahardahan.com"
custom_domain = true

[[routes]]
pattern = "www.shahardahan.com"
custom_domain = true

# ----- Staging environment -----
# Deploy with: bunx opennextjs-cloudflare deploy --env staging
# (or `wrangler deploy --env staging` after `opennextjs-cloudflare build`)
[env.staging]
name = "shahardahan-portflio-staging"

  [env.staging.assets]
  directory = ".open-next/assets"
  binding = "ASSETS"

  [[env.staging.routes]]
  pattern = "staging.shahardahan.com"
  custom_domain = true
